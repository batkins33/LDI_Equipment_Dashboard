<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', Arial, sans-serif;
      margin: 0;
      padding: 16px;
      font-size: 14px;
      color: #202124;
    }

    h2 {
      font-size: 18px;
      font-weight: 500;
      margin: 0 0 16px 0;
      color: #1a73e8;
    }

    h3 {
      font-size: 14px;
      font-weight: 500;
      margin: 16px 0 8px 0;
      color: #5f6368;
    }

    .section {
      margin-bottom: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid #e8eaed;
    }

    .section:last-child {
      border-bottom: none;
    }

    label {
      display: block;
      margin-bottom: 4px;
      font-weight: 500;
      color: #5f6368;
    }

    input[type="text"],
    textarea,
    select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
      margin-bottom: 12px;
    }

    input[type="text"]:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: #1a73e8;
      box-shadow: 0 0 0 1px #1a73e8;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    button {
      background-color: #1a73e8;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      margin-bottom: 8px;
    }

    button:hover {
      background-color: #1765cc;
    }

    button:disabled {
      background-color: #dadce0;
      cursor: not-allowed;
    }

    button.secondary {
      background-color: white;
      color: #1a73e8;
      border: 1px solid #dadce0;
    }

    button.secondary:hover {
      background-color: #f8f9fa;
    }

    button.danger {
      background-color: #d93025;
    }

    button.danger:hover {
      background-color: #c5221f;
    }

    .criterion {
      background-color: #f8f9fa;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 12px;
      position: relative;
    }

    .criterion input,
    .criterion textarea {
      margin-bottom: 8px;
    }

    .criterion button {
      width: auto;
      padding: 6px 12px;
      font-size: 12px;
    }

    .comment-item {
      background-color: #f8f9fa;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 12px;
      border-left: 4px solid #dadce0;
    }

    .comment-item.accepted {
      border-left-color: #34a853;
      background-color: #e6f4ea;
    }

    .comment-anchor {
      font-size: 12px;
      color: #5f6368;
      font-style: italic;
      margin-bottom: 8px;
    }

    .comment-text {
      margin-bottom: 12px;
    }

    .comment-actions {
      display: flex;
      gap: 8px;
    }

    .comment-actions button {
      flex: 1;
      padding: 6px 12px;
      font-size: 12px;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #5f6368;
    }

    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #1a73e8;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error {
      background-color: #fce8e6;
      color: #c5221f;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 12px;
      font-size: 13px;
    }

    .success {
      background-color: #e6f4ea;
      color: #137333;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 12px;
      font-size: 13px;
    }

    .hidden {
      display: none;
    }

    .small-text {
      font-size: 12px;
      color: #5f6368;
      margin-top: -8px;
      margin-bottom: 12px;
    }

    .summary-section {
      background-color: #f8f9fa;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 12px;
    }

    .summary-section h4 {
      margin: 0 0 8px 0;
      font-size: 13px;
      font-weight: 500;
    }

    .summary-section ul {
      margin: 0;
      padding-left: 20px;
    }

    .summary-section li {
      margin-bottom: 4px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="main-view">
    <h2>Rubric Feedback</h2>

    <div class="section">
      <label for="rubric-select">Select Rubric</label>
      <select id="rubric-select">
        <option value="">Create new rubric...</option>
      </select>

      <div id="rubric-form" class="hidden">
        <h3>Rubric Details</h3>
        <label for="rubric-name">Rubric Name</label>
        <input type="text" id="rubric-name" placeholder="e.g., Essay Rubric">

        <label>Criteria</label>
        <div id="criteria-list"></div>
        <button class="secondary" onclick="addCriterion()">+ Add Criterion</button>

        <h3>Settings</h3>

        <label for="tone">Tone</label>
        <select id="tone">
          <option value="supportive">Supportive</option>
          <option value="neutral">Neutral</option>
          <option value="direct">Direct</option>
        </select>

        <label for="comment-style">Comment Style</label>
        <select id="comment-style">
          <option value="paragraphs">Paragraphs</option>
          <option value="bullets">Bullet Points</option>
        </select>

        <button onclick="saveRubric()">Save Rubric</button>
        <button class="secondary" onclick="cancelRubric()">Cancel</button>
      </div>
    </div>

    <div class="section">
      <button onclick="generateFeedback()" id="generate-btn">Generate Feedback</button>
      <p class="small-text">This will analyze the document using the selected rubric</p>
    </div>
  </div>

  <div id="review-view" class="hidden">
    <h2>Review Feedback</h2>

    <div class="section">
      <h3>Summary</h3>
      <div id="summary-content"></div>
    </div>

    <div class="section">
      <h3>Comments</h3>
      <p class="small-text">Review each comment and accept/edit/discard</p>
      <div id="comments-list"></div>
    </div>

    <button onclick="insertFeedback()">Insert Accepted Feedback</button>
    <button class="secondary" onclick="backToMain()">Back to Rubric</button>
  </div>

  <div id="loading-view" class="hidden">
    <div class="loading">
      <div class="spinner"></div>
      <p>Generating feedback...</p>
    </div>
  </div>

  <script>
    var currentRubric = null;
    var currentFeedback = null;
    var criteriaCount = 0;

    // Initialize
    function init() {
      loadRubrics();
      setupEventListeners();
    }

    function setupEventListeners() {
      document.getElementById('rubric-select').addEventListener('change', function() {
        var rubricId = this.value;
        if (rubricId === '') {
          showRubricForm(null);
        } else {
          loadRubricById(rubricId);
        }
      });
    }

    function loadRubrics() {
      google.script.run
        .withSuccessHandler(function(rubrics) {
          var select = document.getElementById('rubric-select');
          rubrics.forEach(function(rubric) {
            var option = document.createElement('option');
            option.value = rubric.id;
            option.textContent = rubric.name;
            select.appendChild(option);
          });
        })
        .withFailureHandler(showError)
        .getRubricList();
    }

    function loadRubricById(rubricId) {
      google.script.run
        .withSuccessHandler(function(rubric) {
          if (rubric) {
            currentRubric = rubric;
            document.getElementById('rubric-form').classList.add('hidden');
            document.getElementById('generate-btn').disabled = false;
          }
        })
        .withFailureHandler(showError)
        .getRubric(rubricId);
    }

    function showRubricForm(rubric) {
      document.getElementById('rubric-form').classList.remove('hidden');

      if (rubric) {
        document.getElementById('rubric-name').value = rubric.name;
        document.getElementById('tone').value = rubric.tone || 'supportive';
        document.getElementById('comment-style').value = rubric.commentStyle || 'paragraphs';

        // Load criteria
        criteriaCount = 0;
        document.getElementById('criteria-list').innerHTML = '';
        rubric.criteria.forEach(function(criterion) {
          addCriterion(criterion);
        });
      } else {
        document.getElementById('rubric-name').value = '';
        criteriaCount = 0;
        document.getElementById('criteria-list').innerHTML = '';
        addCriterion();
      }
    }

    function addCriterion(criterion) {
      criteriaCount++;
      var div = document.createElement('div');
      div.className = 'criterion';
      div.id = 'criterion-' + criteriaCount;

      var label = criterion ? criterion.label : '';
      var description = criterion ? criterion.description : '';
      var weight = criterion ? criterion.weight : '';

      div.innerHTML = `
        <input type="text" placeholder="Criterion Label (e.g., Thesis Statement)" value="${label}" class="criterion-label">
        <textarea placeholder="Description..." class="criterion-description">${description}</textarea>
        <input type="text" placeholder="Weight (optional)" value="${weight}" class="criterion-weight">
        <button class="danger" onclick="removeCriterion(${criteriaCount})">Remove</button>
      `;

      document.getElementById('criteria-list').appendChild(div);
    }

    function removeCriterion(id) {
      var elem = document.getElementById('criterion-' + id);
      if (elem) elem.remove();
    }

    function saveRubric() {
      var name = document.getElementById('rubric-name').value.trim();
      if (!name) {
        showError('Please enter a rubric name');
        return;
      }

      var criteria = [];
      var criterionDivs = document.querySelectorAll('.criterion');

      criterionDivs.forEach(function(div) {
        var label = div.querySelector('.criterion-label').value.trim();
        var description = div.querySelector('.criterion-description').value.trim();
        var weight = div.querySelector('.criterion-weight').value.trim();

        if (label && description) {
          criteria.push({
            label: label,
            description: description,
            weight: weight
          });
        }
      });

      if (criteria.length === 0) {
        showError('Please add at least one criterion');
        return;
      }

      var rubric = {
        id: currentRubric ? currentRubric.id : null,
        name: name,
        criteria: criteria,
        tone: document.getElementById('tone').value,
        commentStyle: document.getElementById('comment-style').value
      };

      google.script.run
        .withSuccessHandler(function(result) {
          if (result.success) {
            showSuccess('Rubric saved successfully!');
            currentRubric = rubric;
            currentRubric.id = result.id;
            document.getElementById('rubric-form').classList.add('hidden');

            // Reload rubric list
            location.reload();
          } else {
            showError(result.error);
          }
        })
        .withFailureHandler(showError)
        .saveRubric(rubric);
    }

    function cancelRubric() {
      document.getElementById('rubric-form').classList.add('hidden');
      document.getElementById('rubric-select').value = '';
    }

    function generateFeedback() {
      if (!currentRubric) {
        showError('Please select or create a rubric first');
        return;
      }

      showView('loading-view');

      var settings = {
        provider: 'openai',
        model: 'gpt-4',
        tone: currentRubric.tone,
        commentStyle: currentRubric.commentStyle
      };

      google.script.run
        .withSuccessHandler(function(result) {
          if (result.success) {
            currentFeedback = result.feedback;
            showFeedbackReview();
          } else {
            showView('main-view');
            showError(result.error);
          }
        })
        .withFailureHandler(function(error) {
          showView('main-view');
          showError(error);
        })
        .generateFeedback(currentRubric, settings);
    }

    function showFeedbackReview() {
      showView('review-view');

      // Show summary
      var summaryHtml = '';
      if (currentFeedback.summary.strengths.length > 0) {
        summaryHtml += '<div class="summary-section"><h4>Strengths:</h4><ul>';
        currentFeedback.summary.strengths.forEach(function(strength) {
          summaryHtml += '<li>' + escapeHtml(strength) + '</li>';
        });
        summaryHtml += '</ul></div>';
      }

      if (currentFeedback.summary.improvements.length > 0) {
        summaryHtml += '<div class="summary-section"><h4>Areas for Improvement:</h4><ul>';
        currentFeedback.summary.improvements.forEach(function(improvement) {
          summaryHtml += '<li>' + escapeHtml(improvement) + '</li>';
        });
        summaryHtml += '</ul></div>';
      }

      if (currentFeedback.summary.grade) {
        summaryHtml += '<div class="summary-section"><h4>Overall Assessment:</h4><p>' +
          escapeHtml(currentFeedback.summary.grade) + '</p></div>';
      }

      document.getElementById('summary-content').innerHTML = summaryHtml;

      // Show comments
      var commentsHtml = '';
      currentFeedback.comments.forEach(function(comment, index) {
        var acceptedClass = comment.accepted ? 'accepted' : '';
        commentsHtml += `
          <div class="comment-item ${acceptedClass}" id="comment-${index}">
            <div class="comment-anchor">"${escapeHtml(comment.anchor)}"</div>
            <div class="comment-text" id="comment-text-${index}">${escapeHtml(comment.text)}</div>
            <div class="comment-actions">
              <button class="secondary" onclick="acceptComment(${index})">${comment.accepted ? 'Accepted ✓' : 'Accept'}</button>
              <button class="secondary" onclick="editComment(${index})">Edit</button>
              <button class="danger" onclick="discardComment(${index})">Discard</button>
            </div>
          </div>
        `;
      });

      document.getElementById('comments-list').innerHTML = commentsHtml;
    }

    function acceptComment(index) {
      currentFeedback.comments[index].accepted = !currentFeedback.comments[index].accepted;
      var elem = document.getElementById('comment-' + index);
      elem.classList.toggle('accepted');

      var btn = elem.querySelector('button');
      btn.textContent = currentFeedback.comments[index].accepted ? 'Accepted ✓' : 'Accept';
    }

    function editComment(index) {
      var textDiv = document.getElementById('comment-text-' + index);
      var currentText = currentFeedback.comments[index].text;

      var textarea = document.createElement('textarea');
      textarea.value = currentText;
      textarea.style.width = '100%';
      textarea.style.minHeight = '60px';

      var saveBtn = document.createElement('button');
      saveBtn.textContent = 'Save';
      saveBtn.style.width = 'auto';
      saveBtn.style.marginTop = '8px';
      saveBtn.onclick = function() {
        currentFeedback.comments[index].text = textarea.value;
        textDiv.innerHTML = escapeHtml(textarea.value);
      };

      textDiv.innerHTML = '';
      textDiv.appendChild(textarea);
      textDiv.appendChild(saveBtn);
    }

    function discardComment(index) {
      currentFeedback.comments[index].accepted = false;
      document.getElementById('comment-' + index).remove();
    }

    function insertFeedback() {
      google.script.run
        .withSuccessHandler(function(result) {
          if (result.success) {
            showSuccess('Feedback inserted successfully!');
            setTimeout(function() {
              backToMain();
            }, 2000);
          } else {
            showError(result.error);
          }
        })
        .withFailureHandler(showError)
        .insertFeedback(currentFeedback);
    }

    function backToMain() {
      showView('main-view');
      currentFeedback = null;
    }

    function showView(viewId) {
      document.getElementById('main-view').classList.add('hidden');
      document.getElementById('review-view').classList.add('hidden');
      document.getElementById('loading-view').classList.add('hidden');

      document.getElementById(viewId).classList.remove('hidden');
    }

    function showError(message) {
      var errorDiv = document.createElement('div');
      errorDiv.className = 'error';
      errorDiv.textContent = message.toString();
      document.body.insertBefore(errorDiv, document.body.firstChild);

      setTimeout(function() {
        errorDiv.remove();
      }, 5000);
    }

    function showSuccess(message) {
      var successDiv = document.createElement('div');
      successDiv.className = 'success';
      successDiv.textContent = message;
      document.body.insertBefore(successDiv, document.body.firstChild);

      setTimeout(function() {
        successDiv.remove();
      }, 3000);
    }

    function escapeHtml(text) {
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Initialize on load
    init();
  </script>
</body>
</html>
