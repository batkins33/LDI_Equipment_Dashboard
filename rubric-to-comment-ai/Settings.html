<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', Arial, sans-serif;
      margin: 0;
      padding: 20px;
      font-size: 14px;
      color: #202124;
    }

    h2 {
      font-size: 18px;
      font-weight: 500;
      margin: 0 0 20px 0;
      color: #1a73e8;
    }

    .section {
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: #5f6368;
    }

    input[type="text"],
    input[type="password"],
    select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
      margin-bottom: 16px;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #1a73e8;
      box-shadow: 0 0 0 1px #1a73e8;
    }

    button {
      background-color: #1a73e8;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-right: 8px;
    }

    button:hover {
      background-color: #1765cc;
    }

    button.secondary {
      background-color: white;
      color: #1a73e8;
      border: 1px solid #dadce0;
    }

    button.secondary:hover {
      background-color: #f8f9fa;
    }

    .help-text {
      font-size: 12px;
      color: #5f6368;
      margin-top: -12px;
      margin-bottom: 16px;
    }

    .success {
      background-color: #e6f4ea;
      color: #137333;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 16px;
      font-size: 13px;
    }

    .error {
      background-color: #fce8e6;
      color: #c5221f;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 16px;
      font-size: 13px;
    }

    .hidden {
      display: none;
    }

    .info-box {
      background-color: #e8f0fe;
      border-left: 4px solid #1a73e8;
      padding: 12px;
      margin-bottom: 20px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <h2>Settings</h2>

  <div class="info-box">
    To use this add-on, you need an API key from either OpenAI or Google Gemini.
  </div>

  <div class="section">
    <label for="provider">LLM Provider</label>
    <select id="provider">
      <option value="openai">OpenAI (GPT-4)</option>
      <option value="gemini">Google Gemini</option>
    </select>
    <p class="help-text">Choose which AI provider to use for generating feedback</p>

    <label for="api-key">API Key</label>
    <input type="password" id="api-key" placeholder="Enter your API key">
    <p class="help-text">
      Get an OpenAI key at: <a href="https://platform.openai.com/api-keys" target="_blank">platform.openai.com</a><br>
      Get a Gemini key at: <a href="https://makersuite.google.com/app/apikey" target="_blank">makersuite.google.com</a>
    </p>

    <button onclick="saveSettings()">Save API Key</button>
    <button class="secondary" onclick="google.script.host.close()">Close</button>
  </div>

  <div id="message-area"></div>

  <script>
    // Load current provider on init
    function init() {
      var provider = localStorage.getItem('llm_provider') || 'openai';
      document.getElementById('provider').value = provider;
    }

    function saveSettings() {
      var provider = document.getElementById('provider').value;
      var apiKey = document.getElementById('api-key').value.trim();

      if (!apiKey) {
        showError('Please enter an API key');
        return;
      }

      // Save provider preference
      localStorage.setItem('llm_provider', provider);

      // Save API key to server
      google.script.run
        .withSuccessHandler(function(result) {
          if (result.success) {
            showSuccess('Settings saved successfully!');
            document.getElementById('api-key').value = '';

            setTimeout(function() {
              google.script.host.close();
            }, 1500);
          } else {
            showError(result.error);
          }
        })
        .withFailureHandler(showError)
        .saveApiKey(provider, apiKey);
    }

    function showSuccess(message) {
      var messageArea = document.getElementById('message-area');
      messageArea.innerHTML = '<div class="success">' + message + '</div>';
    }

    function showError(message) {
      var messageArea = document.getElementById('message-area');
      messageArea.innerHTML = '<div class="error">' + message.toString() + '</div>';
    }

    init();
  </script>
</body>
</html>
