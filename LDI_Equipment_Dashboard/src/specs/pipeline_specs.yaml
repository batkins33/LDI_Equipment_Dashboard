version: 1
timezone: America/Chicago

defaults:
  overlap_windows:
    telematics_hours: 2
    inspections_days: 3
    timecards_days: 7
    approvals_days: 14
    backfill_days: 30

pipelines:
  - name: refresh_dimensions
    schedule: "0 1 * * *"
  - name: ingest_telematics_hourly
    schedule: "15 * * * *"
  - name: ingest_inspections_daily
    schedule: "0 3 * * *"
  - name: ingest_equipment360_daily
    schedule: "0 4 * * *"
  - name: ingest_heavyjob_daily
    schedule: "0 5 * * *"
  - name: build_recon_by_6am
    schedule: "30 5 * * *"
    sla: "06:00"
  - name: approvals_overlay
    schedule: "*/30 * * * *"
  - name: nightly_backfill
    schedule: "0 23 * * *"
