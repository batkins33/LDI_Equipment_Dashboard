# Invoice Sorter Configuration

google_drive:
  # Google Drive folder ID where incoming invoices are dropped
  input_folder_id: ""

  # Google Drive folder ID for invoices that need manual review
  review_folder_id: ""

google_vision:
  # Enable Google Cloud Vision API for OCR
  enabled: true

llm:
  # Enable LLM for advanced extraction (optional)
  enabled: false
  provider: "openai"  # or "anthropic"
  model: "gpt-4"

logging:
  # Google Sheets ID for logging processed invoices
  sheet_id: ""

vendor_mapping:
  # Source for vendor mappings: "sheet" or "firestore"
  source: "sheet"

  # Google Sheets ID containing vendor mappings
  # Expected columns: id, name_pattern, target_folder_id, preferred_filename_pattern
  sheet_id: ""

filename:
  # Pattern for generated filenames
  # Available variables: {vendor}, {invoice_number}, {date}, {amount}
  pattern: "{vendor}__{invoice_number}__{date}.pdf"

processing:
  # Run processor on a schedule (for Cloud Run scheduled jobs)
  schedule: "0 */6 * * *"  # Every 6 hours

  # Timezone for scheduled runs
  timezone: "America/New_York"
